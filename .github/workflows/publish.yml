name: Auto Publish

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.vscode/**'

concurrency:
  group: vscode-marketplace-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Run Build
        run: npm run compile

      - name: Bump Version
        id: bump_version
        run: |
          npm version patch --no-git-tag-version

          NEW_VERSION=$(node -p "require('./package.json').version")
          TAG="v$NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        uses: HaaLeo/publish-vscode-extension@v1
        with:
          pat: ${{ secrets.VSCE_PAT }}
          registryUrl: https://marketplace.visualstudio.com

      - name: Commit Version Bump and Push Tag
        run: |
          git add package.json package-lock.json
          git commit -m "Bump version to ${{ steps.bump_version.outputs.version }} [skip ci]"
          git tag "${{ steps.bump_version.outputs.tag }}"
          git push origin master
          git push origin "${{ steps.bump_version.outputs.tag }}"
